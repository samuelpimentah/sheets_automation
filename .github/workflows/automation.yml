name: ClickUp-Sheets Synchronization

on:
  schedule:
    # Executa diariamente às 07:00 AM (São Paulo, UTC-3)
    # Cron format: minuto hora dia mês dia-da-semana
    # 10:00 UTC = 07:00 São Paulo (verão, UTC-3)
    - cron: '0 10 * * *'
  
  # Permite disparo manual via GitHub Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Run automation
        run: python main.py
      
      - name: Log execution status
        if: always()
        run: |
          echo "Synchronization completed at $(date -u '+%Y-%m-%d %H:%M:%S') UTC"
